<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropWave - Beyond AirDrop</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
            --success-color: #4ade80;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            width: 90%;
            max-width: 450px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 32px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
        }
        .logo-area { display: flex; align-items: center; justify-content: center; margin-bottom: 0.5rem; }
        .logo-icon { width: 32px; height: 32px; margin-right: 0.75rem; color: var(--accent-color); }
        h1 { font-size: 2rem; margin: 0; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
        .subtitle { color: #94a3b8; font-size: 0.9rem; margin-bottom: 2rem; }

        /* QRコード・ID表示エリア */
        .id-panel {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid #334155;
            padding: 1.5rem;
            border-radius: 24px;
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .my-id-text { font-size: 1.1rem; color: #fff; margin-bottom: 1rem; font-family: monospace; font-weight: bold; }
        #qrcode { margin-bottom: 0.75rem; padding: 12px; background: #fff; border-radius: 16px; display: inline-block; }
        #qrcode img { display: block; }
        .scan-label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1.5px; }

        input[type="text"] {
            width: 100%;
            padding: 0.85rem;
            border-radius: 14px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #fff;
            box-sizing: border-box;
            margin-bottom: 0.75rem;
            font-size: 1rem;
            text-align: center;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: var(--accent-color); outline: none; }

        .btn {
            width: 100%;
            padding: 0.85rem;
            border-radius: 14px;
            border: none;
            background: var(--accent-color);
            color: #0f172a;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:hover { background: #7dd3fc; }
        .btn:active { transform: scale(0.98); }

        #status {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            min-height: 1.2rem;
            color: #94a3b8;
            font-weight: 500;
        }
        #status.success { color: var(--success-color); font-weight: bold; }

        /* リッチなウェーブDropZone */
        .drop-zone-container {
            margin-top: 1.5rem;
            position: relative;
        }
        .drop-zone {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            margin: 0 auto;
            border: 3px solid transparent;
            background: radial-gradient(circle at center, rgba(56, 189, 248, 0.12) 0%, transparent 70%);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: #64748b;
            transition: border-color 0.3s, background 0.3s, color 0.3s;
            position: relative;
            overflow: hidden;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent-color);
            background: radial-gradient(circle at center, rgba(56, 189, 248, 0.25) 0%, transparent 80%);
            color: var(--accent-color);
        }
        .drop-zone-icon {
            position: relative;
            z-index: 2;
            transition: transform 0.2s;
        }
        .drop-zone:hover .drop-zone-icon {
            transform: translateY(-2px);
        }
        /* 回転するエネルギー波の効果 */
        .drop-zone::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-conic-gradient(from 0deg, transparent 0deg 30deg, rgba(56, 189, 248, 0.05) 30deg 60deg);
            animation: rotate-wave 12s linear infinite;
            z-index: 1;
        }

        /* 転送中のファイル流動アニメーション */
        .transferring-file {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            border-radius: 14px;
            background: var(--card-bg);
            border: 2px solid var(--accent-color);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }
        .transferring-file.active { display: flex; animation: file-flow 2s cubic-bezier(0.4, 0, 0.2, 1) infinite; }

        @keyframes rotate-wave {
            to { transform: rotate(360deg); }
        }
        @keyframes file-flow {
            0% { bottom: -40px; opacity: 0; transform: translateX(-50%) scale(0.6); }
            20% { opacity: 1; transform: translateX(-50%) scale(1); }
            80% { opacity: 1; transform: translateX(-50%) scale(1); }
            100% { bottom: 180px; opacity: 0; transform: translateX(-50%) scale(0.7); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-area">
        <h1>DropWave</h1>
    </div>
    <div class="subtitle">SIMPLE. CROSS-OS. INSTANT.</div>

    <div class="id-panel">
        <div class="my-id-text">YOUR ID: <span id="my-id">...</span></div>
        <div id="qrcode"></div>
        <div class="scan-label">SCAN TO CONNECT</div>
    </div>

    <input type="text" id="peer-id-input" placeholder="Enter ID or Scan QR">
    <button class="btn" id="connect-btn">CONNECT</button>

    <div id="status">Initializing...</div>

    <div class="drop-zone-container">
        <div class="drop-zone" id="drop-zone">
            <div class="drop-zone-icon">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 16V8m0 8l-4-4m4 4l4-4M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1"/></svg>
            </div>
            <input type="file" id="file-input" style="display: none;">
        </div>
        <div class="transferring-file" id="file-animation-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--accent-color);"><path d="M14.5 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
        </div>
    </div>
</div>

<script>
    // 1. PeerJS 初期化とID生成
    const myId = Math.floor(1000 + Math.random() * 9000).toString();
    document.getElementById('my-id').innerText = myId;
    const peer = new Peer(myId);
    let conn = null;

    peer.on('open', (id) => {
        // 現在のURL（パラメータを除くベース）を取得し、接続用URLを作る
        const baseUrl = window.location.href.split('?')[0];
        const connectUrl = `${baseUrl}?connect=${id}`;

        // 2. URLを埋め込んだQRコードを生成
        new QRCode(document.getElementById("qrcode"), {
            text: connectUrl,
            width: 128,
            height: 128,
            colorDark: "#0f172a",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
        
        // ページ読み込み時にURLパラメータにIDがあるかチェック
        checkUrlParam();
    });

    // パラメータチェック＆自動接続関数
    function checkUrlParam() {
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('connect');
        
        if (targetId) {
            document.getElementById('peer-id-input').value = targetId;
            updateStatus(`QRスキャン検知: ${targetId} に自動接続中...`);
            
            setTimeout(() => {
                conn = peer.connect(targetId);
                setupConnection();
            }, 600);
        } else {
            updateStatus('接続を待つか、QRをスキャンしてください');
        }
    }

    // 相手から接続されたとき
    peer.on('connection', (incomingConn) => {
        conn = incomingConn;
        setupConnection();
    });

    // ボタンを押して手動接続するとき
    document.getElementById('connect-btn').addEventListener('click', () => {
        const peerId = document.getElementById('peer-id-input').value;
        if (peerId) {
            updateStatus(`${peerId} に接続中...`);
            conn = peer.connect(peerId);
            setupConnection();
        }
    });

    // 接続成立後の処理
    function setupConnection() {
        conn.on('open', () => {
            updateStatus(`CONNECTED: ${conn.peer}`, 'success');
            
            // URLの「?connect=xxxx」を消して見た目を綺麗にする
            const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
            window.history.replaceState({path: cleanUrl}, '', cleanUrl);
        });

        // データ受信時
        conn.on('data', (data) => {
            if (data.file) {
                startTransferAnimation('receiving');
                
                const blob = new Blob([data.file], { type: data.type });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = data.name;
                a.click();
                
                updateStatus(`RECEIVED: ${data.name}`, 'success');
                setTimeout(stopTransferAnimation, 2000);
            }
        });
    }

    // ファイル送信管理
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const animationIcon = document.getElementById('file-animation-icon');

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        handleFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

    function handleFiles(files) {
        if (files.length === 0 || !conn) {
            if (!conn) alert('先に相手と通信を接続してください！');
            return;
        }

        const file = files[0];
        updateStatus(`SENDING: ${file.name}...`);
        startTransferAnimation('sending');

        conn.send({
            file: file,
            name: file.name,
            type: file.type
        });

        setTimeout(() => {
            updateStatus(`SENT: ${file.name}`, 'success');
            stopTransferAnimation();
        }, 2000);
    }

    // アニメーション制御
    function startTransferAnimation(type) {
        animationIcon.classList.add('active');
        if (type === 'receiving') {
            animationIcon.style.animationDirection = 'reverse'; // 受信は上から下へ
        } else {
            animationIcon.style.animationDirection = 'normal';   // 送信は下から上へ
        }
    }
    function stopTransferAnimation() {
        animationIcon.classList.remove('active');
    }

    function updateStatus(text, type = '') {
        const statusEl = document.getElementById('status');
        statusEl.innerText = text;
        statusEl.className = type;
    }
</script>

</body>
</html>
