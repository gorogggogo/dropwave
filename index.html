<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropWave - Nano Banana</title>
    
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    
    <style>
        /* 無駄をすべて削ぎ落とした、シンプルかつクリーンなデザイン */
        body {
            font-family: -apple-system, sans-serif;
            background: #f8fafc;
            color: #0f172a;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .box {
            width: 100%;
            max-width: 380px;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            text-align: center;
            box-sizing: border-box;
        }
        h1 { font-size: 1.6rem; margin: 0 0 20px 0; letter-spacing: -0.5px; }
        
        /* ⚠️ ローカル環境警告アラート */
        .alert {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            line-height: 1.4;
            display: none; /* 通常は非表示 */
        }

        #qrcode {
            margin: 20px auto;
            padding: 10px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            display: inline-block;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            box-sizing: border-box;
            margin-bottom: 10px;
            font-size: 1rem;
            text-align: center;
        }
        
        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #0284c7;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }
        button:hover { background: #0369a1; }

        #status {
            margin: 20px 0;
            font-size: 0.9rem;
            font-weight: bold;
            color: #64748b;
        }

        /* ファイル選択エリア */
        .file-zone {
            border: 2px dashed #0284c7;
            background: #f0f9ff;
            padding: 30px 10px;
            border-radius: 12px;
            cursor: pointer;
            color: #0369a1;
            font-size: 0.9rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>DropWave</h1>

    <div class="alert" id="local-warning">
        ⚠️ <b>注意:</b> 現在ローカルファイルとして開かれています。QRコードを正常に機能させるには、GitHub Pages（https://...）のURLにアクセスして使用してください。
    </div>

    <div>YOUR ID: <span id="my-id" style="font-weight: bold;">...</span></div>
    
    <div id="qrcode"></div>
    
    <input type="text" id="peer-id-input" placeholder="相手のIDを手動入力">
    <button id="connect-btn">接続する</button>

    <div id="status">準備中...</div>

    <div class="file-zone" id="drop-zone">
        ここをタップしてファイルを選択
        <input type="file" id="file-input" style="display: none;">
    </div>
</div>

<script>
    // 1. 自分の4桁IDをランダム生成
    const myId = Math.floor(1000 + Math.random() * 9000).toString();
    document.getElementById('my-id').innerText = myId;

    // 2. PeerJSの起動
    const peer = new Peer(myId);
    let conn = null;

    peer.on('open', (id) => {
        // 現在開いているURLをチェック
        const currentUrl = window.location.href.split('?')[0];
        
        // もし file:// から始まっていたら警告を表示する
        if (window.location.protocol === 'file:') {
            document.getElementById('local-warning').style.display = 'block';
        }

        // 🔗 確実に「現在のURL?connect=4桁数字」という形の完全なURLを組み立てる
        const connectUrl = `${currentUrl}?connect=${id}`;

        // QRコードを生成（中身を完全なURLリンクにする）
        new QRCode(document.getElementById("qrcode"), {
            text: connectUrl,
            width: 140,
            height: 140,
            colorDark: "#0f172a",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        // URLに相手のID（?connect=xxxx）が含まれているか確認
        checkUrlParam();
    });

    // URLの「?connect=xxxx」を読み取って自動で繋ぐ関数
    function checkUrlParam() {
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('connect');
        
        if (targetId) {
            document.getElementById('peer-id-input').value = targetId;
            document.getElementById('status').innerText = `QRコードを検知: ${targetId} に自動接続します...`;
            
            // 接続を少し待ってから実行（安定化のため）
            setTimeout(() => {
                conn = peer.connect(targetId);
                setupConnection();
            }, 1000);
        } else {
            document.getElementById('status').innerText = '接続を待つか、QRコードをスキャンしてください';
        }
    }

    // 相手から接続されたときのイベント
    peer.on('connection', (incomingConn) => {
        conn = incomingConn;
        setupConnection();
    });

    // ボタン手動接続
    document.getElementById('connect-btn').addEventListener('click', () => {
        const peerId = document.getElementById('peer-id-input').value;
        if (peerId) {
            document.getElementById('status').innerText = `${peerId} に接続中...`;
            conn = peer.connect(peerId);
            setupConnection();
        }
    });

    // 接続完了後の処理
    function setupConnection() {
        conn.on('open', () => {
            document.getElementById('status').innerText = `接続完了！ 相手: ${conn.peer}`;
            document.getElementById('status').style.color = '#16a34a'; // 緑色に
            
            // URLの後ろの「?connect=xxxx」を消して、ブラウザの見た目を元に戻す
            const cleanUrl = window.location.origin + window.location.pathname;
            window.history.replaceState({}, '', cleanUrl);
        });

        // ファイル受信
        conn.on('data', (data) => {
            if (data.file) {
                document.getElementById('status').innerText = 'ファイルを受信中...';
                
                const blob = new Blob([data.file], { type: data.type });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = data.name;
                a.click();
                
                document.getElementById('status').innerText = `受信完了: ${data.name}`;
            }
        });
    }

    // ファイル送信
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file || !conn) {
            if (!conn) alert('先に相手と接続してください');
            return;
        }

        document.getElementById('status').innerText = `送信中: ${file.name}`;
        
        conn.send({
            file: file,
            name: file.name,
            type: file.type
        });

        document.getElementById('status').innerText = `送信完了: ${file.name}`;
    });
</script>

</body>
</html>
