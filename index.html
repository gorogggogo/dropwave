<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropWave - Nano Banana +</title>
    
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    
    <style>
        body {
            font-family: -apple-system, sans-serif;
            background: #f8fafc;
            color: #0f172a;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .box {
            width: 100%;
            max-width: 380px;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            text-align: center;
            box-sizing: border-box;
        }
        h1 { font-size: 1.6rem; margin: 0 0 20px 0; letter-spacing: -0.5px; }
        
        .alert {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            line-height: 1.4;
            display: none;
        }

        #qrcode {
            margin: 20px auto;
            padding: 10px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            display: inline-block;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            box-sizing: border-box;
            margin-bottom: 10px;
            font-size: 1rem;
            text-align: center;
        }
        
        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #0284c7;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }
        button:hover { background: #0369a1; }

        #status {
            margin: 20px 0;
            font-size: 0.9rem;
            font-weight: bold;
            color: #64748b;
        }

        /* ファイル送信エリア */
        .file-zone {
            border: 2px dashed #cbd5e1;
            background: #f8fafc;
            padding: 20px 10px;
            border-radius: 12px;
            cursor: pointer;
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 20px;
        }
        .file-zone:hover { border-color: #0284c7; background: #f0f9ff; color: #0369a1; }

        /* 🆕 テキスト送信エリア */
        .text-zone {
            margin-top: 20px;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
            text-align: left;
        }
        .text-zone label {
            font-size: 0.8rem;
            font-weight: bold;
            color: #64748b;
            display: block;
            margin-bottom: 5px;
        }
        .text-btn { background: #0ea5e9; }
        .text-btn:hover { background: #0284c7; }

        /* 🆕 受信テキスト表示エリア */
        .received-box {
            display: none;
            margin-top: 20px;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 12px;
            text-align: left;
            border: 1px solid #e2e8f0;
        }
        .received-title { font-size: 0.8rem; color: #475569; font-weight: bold; margin-bottom: 5px; }
        .received-content { 
            font-size: 0.95rem; 
            white-space: pre-wrap; 
            word-break: break-all; 
            margin-bottom: 10px; 
            background: white;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
        }
        .copy-btn { background: #475569; font-size: 0.85rem; padding: 8px; }
        .copy-btn:hover { background: #334155; }
    </style>
</head>
<body>

<div class="box">
    <h1>DropWave</h1>

    <div class="alert" id="local-warning">
        ⚠️ <b>注意:</b> GitHub Pages（https://...）のURLにアクセスして使用してください。
    </div>

    <div>YOUR ID: <span id="my-id" style="font-weight: bold;">...</span></div>
    
    <div id="qrcode"></div>
    
    <input type="text" id="peer-id-input" placeholder="相手のIDを手動入力">
    <button id="connect-btn">接続する</button>

    <div id="status">準備中...</div>

    <div class="received-box" id="received-text-box">
        <div class="received-title">📥 受信したテキスト / URL</div>
        <div class="received-content" id="received-text"></div>
        <button class="copy-btn" id="copy-btn">クリップボードにコピー</button>
    </div>

    <div class="text-zone">
        <label for="text-to-send">テキストやURLを送信</label>
        <input type="text" id="text-to-send" placeholder="ここにURLや文字を入力">
        <button class="text-btn" id="send-text-btn">テキストを送信</button>
    </div>

    <div class="file-zone" id="drop-zone">
        または、ここをタップしてファイルを選択
        <input type="file" id="file-input" style="display: none;">
    </div>
</div>

<script>
    const myId = Math.floor(1000 + Math.random() * 9000).toString();
    document.getElementById('my-id').innerText = myId;

    const peer = new Peer(myId);
    let conn = null;

    peer.on('open', (id) => {
        const currentUrl = window.location.href.split('?')[0];
        if (window.location.protocol === 'file:') {
            document.getElementById('local-warning').style.display = 'block';
        }

        const connectUrl = `${currentUrl}?connect=${id}`;

        new QRCode(document.getElementById("qrcode"), {
            text: connectUrl,
            width: 140,
            height: 140,
            colorDark: "#0f172a",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        checkUrlParam();
    });

    function checkUrlParam() {
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('connect');
        if (targetId) {
            document.getElementById('peer-id-input').value = targetId;
            document.getElementById('status').innerText = `QRコードを検知: ${targetId} に自動接続します...`;
            setTimeout(() => {
                conn = peer.connect(targetId);
                setupConnection();
            }, 1000);
        } else {
            document.getElementById('status').innerText = '接続を待つか、QRコードをスキャンしてください';
        }
    }

    peer.on('connection', (incomingConn) => {
        conn = incomingConn;
        setupConnection();
    });

    document.getElementById('connect-btn').addEventListener('click', () => {
        const peerId = document.getElementById('peer-id-input').value;
        if (peerId) {
            document.getElementById('status').innerText = `${peerId} に接続中...`;
            conn = peer.connect(peerId);
            setupConnection();
        }
    });

    // 🔗 接続確立後のデータ処理
    function setupConnection() {
        conn.on('open', () => {
            document.getElementById('status').innerText = `接続完了！ 相手: ${conn.peer}`;
            document.getElementById('status').style.color = '#16a34a';
            
            const cleanUrl = window.location.origin + window.location.pathname;
            window.history.replaceState({}, '', cleanUrl);
        });

        // 📥 データ受信時の仕分け処理
        conn.on('data', (data) => {
            // ① テキストデータの場合
            if (data.dataType === 'text') {
                document.getElementById('status').innerText = 'テキストを受信しました！';
                document.getElementById('received-text-box').style.display = 'block';
                document.getElementById('received-text').innerText = data.content;
            } 
            // ② ファイルデータの場合
            else if (data.dataType === 'file' || data.file) {
                document.getElementById('status').innerText = 'ファイルを受信中...';
                const blob = new Blob([data.file], { type: data.type });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = data.name;
                a.click();
                document.getElementById('status').innerText = `受信完了: ${data.name}`;
            }
        });
    }

    // 📤 🆕 テキスト送信ボタンの処理
    document.getElementById('send-text-btn').addEventListener('click', () => {
        const textContent = document.getElementById('text-to-send').value;
        if (!textContent) return;
        if (!conn) {
            alert('先に相手と接続してください');
            return;
        }

        // 識別用の「dataType: 'text'」を付けて送信
        conn.send({
            dataType: 'text',
            content: textContent
        });

        document.getElementById('status').innerText = 'テキストを送信しました';
        document.getElementById('text-to-send').value = ''; // 入力欄をクリア
    });

    // 📋 🆕 コピーボタンの処理
    document.getElementById('copy-btn').addEventListener('click', () => {
        const textToCopy = document.getElementById('received-text').innerText;
        navigator.clipboard.writeText(textToCopy).then(() => {
            const copyBtn = document.getElementById('copy-btn');
            copyBtn.innerText = 'コピーしました！';
            copyBtn.style.background = '#16a34a';
            setTimeout(() => {
                copyBtn.innerText = 'クリップボードにコピー';
                copyBtn.style.background = '#475569';
            }, 2000);
        });
    });

    // 📤 ファイル送信の処理
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file || !conn) {
            if (!conn) alert('先に相手と接続してください');
            return;
        }

        document.getElementById('status').innerText = `送信中: ${file.name}`;
        
        // 識別用の「dataType: 'file'」を付けて送信
        conn.send({
            dataType: 'file',
            file: file,
            name: file.name,
            type: file.type
        });

        document.getElementById('status').innerText = `送信完了: ${file.name}`;
    });
</script>

</body>
</html>
