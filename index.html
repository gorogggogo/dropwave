<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropWave - Beyond AirDrop (v2)</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
            --success-color: #4ade80;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .container {
            width: 90%;
            max-width: 480px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 32px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
        }
        .logo-area { display: flex; align-items: center; justify-content: center; margin-bottom: 0.5rem; }
        .logo-icon { width: 32px; height: 32px; margin-right: 0.75rem; color: var(--accent-color); animation: ripple 2s infinite; }
        h1 { font-size: 2rem; margin: 0; font-weight: 700; color: #fff; }
        .subtitle { color: #94a3b8; font-size: 0.95rem; margin-bottom: 2.5rem; }

        /* QRコードセクション */
        .id-panel {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid #334155;
            padding: 1.5rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .my-id-text { font-size: 1.1rem; color: #fff; margin-bottom: 1rem; font-family: monospace; }
        #qrcode { margin-bottom: 0.75rem; padding: 10px; background: #fff; border-radius: 12px; }
        #qrcode img { display: block; }
        .scan-label { font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }

        input[type="text"] {
            width: 100%;
            padding: 0.9rem;
            border-radius: 14px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #fff;
            box-sizing: border-box;
            margin-bottom: 1rem;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: var(--accent-color); outline: none; }

        .btn {
            width: 100%;
            padding: 0.9rem;
            border-radius: 14px;
            border: none;
            background: var(--accent-color);
            color: #0f172a;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:hover { background: #7dd3fc; }
        .btn:active { transform: scale(0.98); }

        /* リッチな DropZone */
        .drop-zone-container {
            margin-top: 2rem;
            position: relative;
        }
        .drop-zone {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            margin: 0 auto;
            border: 4px solid transparent;
            background: radial-gradient(circle at center, rgba(56, 189, 248, 0.15) 0%, transparent 70%);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: #94a3b8;
            transition: border-color 0.3s, background 0.3s;
            position: relative;
            overflow: hidden;
            animation: pulse-bg 3s infinite;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent-color);
            background: radial-gradient(circle at center, rgba(56, 189, 248, 0.25) 0%, transparent 80%);
        }
        .drop-zone-icon {
            font-size: 2rem;
            position: relative;
            z-index: 2;
        }
        /* DropZone のエネルギーウェーブアニメーション */
        .drop-zone::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-conic-gradient(from 0deg, transparent 0deg 20deg, rgba(56, 189, 248, 0.1) 20deg 40deg);
            animation: rotate-wave 10s linear infinite;
            z-index: 1;
        }

        #status {
            margin-top: 1.5rem;
            font-size: 0.95rem;
            min-height: 1.2rem;
            color: #fff;
        }
        #status.success { color: var(--success-color); }

        /* 転送中のアニメーション */
        .transferring-file {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background: var(--card-bg);
            border: 2px solid var(--accent-color);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .transferring-file.active { display: flex; animation: file-flow 2s linear infinite; }

        /* アニメーション定義 */
        @keyframes ripple {
            0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(56, 189, 248, 0); }
            100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); }
        }
        @keyframes pulse-bg {
            0%, 100% { background-color: transparent; }
            50% { background-color: rgba(56, 189, 248, 0.05); }
        }
        @keyframes rotate-wave {
            to { transform: rotate(360deg); }
        }
        @keyframes file-flow {
            0% { bottom: -50px; opacity: 0; transform: translateX(-50%) scale(0.5); }
            10% { opacity: 1; transform: translateX(-50%) scale(1); }
            90% { opacity: 1; transform: translateX(-50%) scale(1); }
            100% { bottom: 200px; opacity: 0; transform: translateX(-50%) scale(0.8); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-area">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
        <h1>DropWave</h1>
    </div>
    <div class="subtitle">SIMPLE. CROSS-OS. INSTANT.</div>

    <div class="id-panel">
        <div class="my-id-text">YOUR ID: <span id="my-id">...</span></div>
        <div id="qrcode"></div>
        <div class="scan-label">SCAN TO CONNECT</div>
    </div>

    <input type="text" id="peer-id-input" placeholder="Enter Peer ID or scan QR">
    <button class="btn" id="connect-btn">CONNECT</button>

    <div id="status">Ready to connect...</div>

    <div class="drop-zone-container">
        <div class="drop-zone" id="drop-zone">
            <div class="drop-zone-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 16V8m0 8l-4-4m4 4l4-4M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1"/></svg>
            </div>
            <input type="file" id="file-input" style="display: none;" multiple>
        </div>
        <div class="transferring-file" id="file-animation-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
        </div>
    </div>
</div>

<script>
    // 1. PeerJS の初期化 (ID生成)
    const myId = Math.floor(1000 + Math.random() * 9000).toString();
    document.getElementById('my-id').innerText = myId;
    const peer = new Peer(myId);
    let conn = null;

    peer.on('open', (id) => {
        // 2. QRコードの生成 (IDが確定してから)
        new QRCode(document.getElementById("qrcode"), {
            text: id,
            width: 128,
            height: 128,
            colorDark: "#0f172a",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
        updateStatus('Waiting for connection or ID input...');
    });

    peer.on('connection', (incomingConn) => {
        conn = incomingConn;
        setupConnection();
    });

    document.getElementById('connect-btn').addEventListener('click', () => {
        const peerId = document.getElementById('peer-id-input').value;
        if (peerId) {
            updateStatus(`Connecting to ${peerId}...`);
            conn = peer.connect(peerId);
            setupConnection();
        }
    });

    function setupConnection() {
        conn.on('open', () => {
            updateStatus(`CONNECTED TO: ${conn.peer}`, 'success');
            // 接続に成功したら入力エリアやQRコードを少し暗くするなどUIを調整しても良い
        });

        conn.on('data', (data) => {
            if (data.file) {
                // 受信アニメーションを開始
                startTransferAnimation('receiving');
                const blob = new Blob([data.file], { type: data.type });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = data.name;
                a.click();
                updateStatus(`RECEIVED: ${data.name} (${data.type})`, 'success');
                setTimeout(stopTransferAnimation, 2500); // 2.5秒後にアニメーション停止
            }
        });
    }

    // ファイル送信の処理
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const animationIcon = document.getElementById('file-animation-icon');

    dropZone.addEventListener('click', () => fileInput.click());

    // ドラッグ＆ドロップの視覚効果
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        handleFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

    function handleFiles(files) {
        if (files.length === 0 || !conn) {
            if (!conn) alert('Please connect to a peer first!');
            return;
        }

        const file = files[0];
        updateStatus(`SENDING: ${file.name}...`);
        
        // 送信アニメーションを開始
        startTransferAnimation('sending');

        conn.send({
            file: file,
            name: file.name,
            type: file.type
        });

        // 送信完了。 PeerJSは完了イベントが直接取れないため、少し待ってステータスを更新
        setTimeout(() => {
            updateStatus(`SENT: ${file.name}`, 'success');
            stopTransferAnimation();
        }, 2000);
    }

    // アニメーション制御関数
    function startTransferAnimation(type) {
        animationIcon.classList.add('active');
        if (type === 'receiving') {
            animationIcon.style.animationDirection = 'reverse'; // 受信時は逆向き
        } else {
            animationIcon.style.animationDirection = 'normal';
        }
    }
    function stopTransferAnimation() {
        animationIcon.classList.remove('active');
    }

    function updateStatus(text, type = '') {
        const statusEl = document.getElementById('status');
        statusEl.innerText = text;
        statusEl.className = type;
    }
</script>

</body>
</html>
